services:
  main:
    build: 
      context: .
    platform: linux/amd64
    restart: unless-stopped
    environment:
      DB_CONNECT_STRING: $DB_CONNECT_STRING
      DB_USER: $DB_USER
      DB_HOST: $DB_HOST
      DB_PASSWORD: $DB_PASSWORD
      TWILIO_AUTH_TOKEN: $TWILIO_AUTH_TOKEN
      LOGLEVEL: $LOGLEVEL
    network_mode: host
    volumes:
      - ./src/static:/src/static
    image: git.tcrez.dev/tcrez/checkin-viz

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    environment:
      DB_CONNECT_STRING: $DB_CONNECT_STRING
      DB_USER: $DB_USER
      DB_HOST: $DB_HOST
      DB_PASSWORD: $DB_PASSWORD
      TWILIO_AUTH_TOKEN: $TWILIO_AUTH_TOKEN
      LOGLEVEL: $LOGLEVEL
      DISCORD_TOKEN: $DISCORD_TOKEN
      ALLOWED_MESSAGE_CHANNEL_ID: $ALLOWED_MESSAGE_CHANNEL_ID

  rq-cron:
    build:
      context: .
      dockerfile: Dockerfile.rq
    platform: linux/amd64
    restart: unless-stopped
    entrypoint: poetry run rq cron tasks.py --url redis://valkey:6379
    environment:
      DB_CONNECT_STRING: $DB_CONNECT_STRING
      DB_USER: $DB_USER
      DB_HOST: $DB_HOST
      DB_PASSWORD: $DB_PASSWORD
      TWILIO_AUTH_TOKEN: $TWILIO_AUTH_TOKEN
      LOGLEVEL: $LOGLEVEL
      DISCORD_TOKEN: $DISCORD_TOKEN
      ALLOWED_MESSAGE_CHANNEL_ID: $ALLOWED_MESSAGE_CHANNEL_ID
    depends_on:
      valkey:
        condition: service_healthy

  rq-worker:
    build:
      context: .
      dockerfile: Dockerfile.rq
    platform: linux/amd64
    restart: unless-stopped
    entrypoint: poetry run rq worker cron -u redis://valkey:6379
    environment:
      DB_CONNECT_STRING: $DB_CONNECT_STRING
      DB_USER: $DB_USER
      DB_HOST: $DB_HOST
      DB_PASSWORD: $DB_PASSWORD
      TWILIO_AUTH_TOKEN: $TWILIO_AUTH_TOKEN
      LOGLEVEL: $LOGLEVEL
      DISCORD_TOKEN: $DISCORD_TOKEN
      ALLOWED_MESSAGE_CHANNEL_ID: $ALLOWED_MESSAGE_CHANNEL_ID
    depends_on:
      valkey:
        condition: service_healthy

  valkey:
    hostname: valkey
    image: valkey/valkey:9-alpine
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
